services:
  - type: web
    name: chess-backend-unified
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --fake-initial"
    startCommand: "daphne -b 0.0.0.0 -p $PORT django_project.asgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: django_project.settings
      - key: PYTHONPATH
        value: .
      - key: DATABASE_URL
        fromDatabase:
          name: chessdb
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: chess-redis
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
