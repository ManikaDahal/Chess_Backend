# fly.toml app configuration file generated for chess-auth-backend-manika-dahal on 2026-04-08T07:47:31+05:45
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'chess-auth-backend-manika-dahal'
primary_region = 'bom'
console_command = '/code/manage.py shell'

[build]

[deploy]
  release_command = 'python manage.py migrate --noinput'

[env]
  PORT = '8000'

[http_service]
  internal_port = 7860
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[[statics]]
  guest_path = '/code/static'
  url_prefix = '/static/'
